name: Update market data & brief

on:
  schedule:
    # 毎日 日本時間 7:30 (UTC 22:30 前日) に実行
    - cron: "30 22 * * *"
  workflow_dispatch:   # 手動実行も可

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas requests

      - name: Fetch market data
        run: python pipeline/fetch_data.py

      - name: Fetch sector deviation ranking
        run: python pipeline/fetch_deviation.py || echo "乖離データ取得に失敗(既存を維持して続行)"

      - name: Generate weekly brief (月曜または手動実行時)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 月曜または手動実行時にブリーフを再生成(キー未設定ならスキップ)
          if [ -n "$ANTHROPIC_API_KEY" ] && { [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; }; then
            python pipeline/generate_brief.py
          else
            echo "brief生成をスキップ"
          fi

      - name: Commit & push
        run: |
          git config user.name "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +%Y-%m-%d)"
          git push
